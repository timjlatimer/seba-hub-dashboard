<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta http-equiv="Cache-Control" content="no-store">
<title>Dingo Card</title>
<style>
 :root{--bg:#070b10;--ink:#e9eef4;--muted:#8aa0b4;--gold:#e8b54d;--teal:#36c2b4;--cyan:#51a7f9;--green:#46c66d;--yellow:#e8c24d;--red:#e0556b}
 *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:"Segoe UI",system-ui,Arial,sans-serif;padding:14px;width:980px}
 .ticker{display:flex;gap:20px;align-items:center;background:#05080c;border:1px solid #16222e;border-radius:8px;padding:7px 12px;font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden}
 .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;vertical-align:middle}
 .head{display:flex;justify-content:space-between;align-items:flex-start;margin:12px 2px 10px;gap:16px}
 .vv{font-size:12.5px;color:var(--muted);line-height:1.55}
 .vv b{color:var(--gold)}.vv .big{color:var(--ink);font-size:15px;font-weight:700}.wiifm{color:var(--teal)}
 .meter{min-width:210px;text-align:right;font-size:11.5px;color:var(--muted)}
 .bar{height:8px;border-radius:5px;background:#16222e;margin-top:5px;overflow:hidden}.bar>i{display:block;height:100%}
 .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:7px}
 .cell{background:#0f1620;border:1px solid #20303f;border-radius:8px;min-height:96px;padding:8px;position:relative;font-size:11px}
 .cell .id{color:#5c768a;font-weight:700;font-size:9.5px}.cell .lab{color:#cdd8e2;font-weight:600;margin-top:2px}
 .cell .kpi{color:var(--muted);font-size:10px;margin-top:2px}
 .cell .ryg{position:absolute;top:8px;right:8px;width:9px;height:9px;border-radius:50%}
 .cell .sb{position:absolute;left:8px;right:8px;bottom:8px;height:5px;border-radius:3px;background:#16222e;overflow:hidden}.cell .sb>i{display:block;height:100%}
 .ptk{background:linear-gradient(160deg,#3a2c10,#15100a);border:1px solid var(--gold);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;color:var(--gold);font-weight:700}
</style></head><body>
 <div class="ticker" id="ticker"></div>
 <div class="head"><div class="vv" id="vv"></div><div class="meter" id="meter"></div></div>
 <div class="grid" id="grid"></div>
<script>
const RYG={green:'#46c66d',yellow:'#e8c24d',red:'#e0556b'};
const SRC=(new URLSearchParams(location.search).get('card'))||'sample-card.json';
fetch(SRC+'?t='+Date.now()).then(r=>r.json()).then(card=>{
 document.getElementById('vv').innerHTML =
   '<div class="big">'+card.store+'</div>'+
   '<b>VIVID VISION</b> &mdash; '+card.vivid_vision.purpose+' &middot; <i>'+card.vivid_vision.bhag+'</i> &middot; '+card.vivid_vision.values.join(' / ')+'<br>'+
   '<span class="wiifm"><b>WIIFM:</b> '+card.wiifm+'</span> &nbsp;&middot;&nbsp; <span style="color:#5c768a">Caller: '+card.caller+'</span>';
 const human=card.squares.filter(s=>!s.ptk);
 const avgH=Math.round(human.reduce((a,s)=>a+(s.human||20),0)/human.length), ag=100-avgH;
 document.getElementById('meter').innerHTML='<b style="color:#cdd8e2">80 / 20 roll-up</b><br>Caller '+avgH+'% &middot; AI agents '+ag+'%'+
   '<div class="bar"><i style="width:100%;background:linear-gradient(90deg,#51a7f9 '+ag+'%,#e8b54d '+ag+'%)"></i></div>';
 document.getElementById('ticker').innerHTML = card.ticker.map(t=>'<span><span class="dot" style="background:'+RYG[t.ryg]+'"></span>'+t.k+' '+t.v+'</span>').join('') + '<span style="color:#5c768a">&mdash; live ticker-tape KPIs &mdash;</span>';
 const g=document.getElementById('grid');
 card.squares.forEach(s=>{
   const c=document.createElement('div');
   if(s.ptk){c.className='cell ptk';c.innerHTML='PTK<div style="font-weight:600;font-size:9px;color:#e8c98a;margin-top:3px">Promises<br>to Keep</div>';}
   else{const a=100-(s.human||20);c.className='cell';
     c.innerHTML='<span class="id">'+s.id+'</span><div class="lab">'+s.label+'</div><div class="kpi">'+(s.kpi||'')+'</div>'+
       '<span class="ryg" style="background:'+RYG[s.ryg||'green']+'"></span>'+
       '<div class="sb"><i style="width:'+a+'%;background:#51a7f9"></i></div>';}
   g.appendChild(c);
 });
});
</script>
</body></html>
